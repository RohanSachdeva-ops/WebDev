<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body{
        font-family:Arial;
        margin-bottom:none;
        margin-top:none;
      }
      .send-button{
        background-color: rgb(25,135,84);
        color:white;
        padding:12px 20px;
        margin-left: 10px;
        border-radius: 10px;
        border:none;
        font-size:15px;
        cursor:pointer;
      }

      .chat-input{
        border-radius:10px;
        padding:12px 15px;
        border-width:1px;
        font-size:15px;

        flex-grow: 1;
      }

      .chat-input-container{
        display:flex;
        margin-bottom:60px;
      }

      .app-container{
        max-width:600px;
        margin-left:auto;
        margin-right:auto;

        height: 100vh;
        display:flex;
        flex-direction:column;
      }

      
      .chat-message-user{
        display:flex;
        justify-content: end;
        align-items: start;
      }
      .chat-message-robot{
        display:flex;
        align-items: start;
      }

      .chat-message-text{
        background-color: rgb(238,238,238);
        padding: 15px 20px;
        border-radius:10px;
        margin-right:10px;
        margin-left:10px;
        margin-bottom:20px;

        max-width:300px;
      }

      .chat-message-profile{
        width:40px;
      }

      .chat-messages-container{
        flex-grow:1;
        margin-top:40px;
        overflow:scroll;
        scrollbar-width:none;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput({chatMessages,setChatMessages}){

        const [inputText,setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
        }

        function sendMessage(){
          const newChatMessages = [
            ...chatMessages,
            {
              message : inputText,
              sender : 'user',
              id : crypto.randomUUID()
            }
          ]
          setChatMessages (newChatMessages);
          setInputText('');

          const response = Chatbot.getResponse(inputText);

          setChatMessages([
            ...newChatMessages,
            {
              message:response,
              sender:'robot',
              id:crypto.randomUUID()
            }
          ])
        }


        return (
          <div 
            className='chat-input-container'
          >
            <input 
              onChange={saveInputText}
              placeholder = "Send a message to Chatbot" 
              size="30"
              value={inputText}
              className='chat-input'
            />
            <button 
            onClick={sendMessage}
            className='send-button'
            >
            Send</button>
          </div>
        )
      }
